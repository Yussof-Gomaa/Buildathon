{% extends "core/base.html" %}

{% block title %}تسجيل دخول السائق{% endblock %}

{% block content %}
<div class="app-shell">
  <div class="card login-card">
    <h1 style="text-align:center;margin-bottom:1.5rem">سيد — السائق</h1>

    {% if form.errors %}
    <ul class="messages">
      <li class="error">اسم المستخدم أو كلمة المرور غير صحيحة</li>
    </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">اسم المستخدم</label>
        <input type="text" name="username" id="id_username" required autofocus>
      </div>
      <div class="form-group">
        <label for="id_password">كلمة المرور</label>
        <input type="password" name="password" id="id_password" required>
      </div>
      <button type="submit" class="btn btn-primary">دخول</button>
    </form>
  </div>
</div>
{% endblock %}
